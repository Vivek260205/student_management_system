spring:
  application:
    name: student-management-backend
  main:
    web-application-type: servlet
  h2:
    console:
      enabled: true
  flyway:
    enabled: false

# Default development profile
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

jwt:
  secret: mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes
  expirationMs: 3600000

logging:
  level:
    com.example.sms: DEBUG

cors:
  allowed-origins: http://localhost:3000

# Production profile
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes}
  expirationMs: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    com.example.sms: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
