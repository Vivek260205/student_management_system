spring:
  application:
    name: student-management-backend
  main:
    # CRITICAL: Ensure this is a web application, NOT a CLI/batch app
    web-application-type: servlet
    # Allow app to continue even if some beans fail initialization
    lazy-initialization: false
  h2:
    console:
      enabled: true
  flyway:
    # CRITICAL: Disable Flyway for all profiles
    enabled: false
  # JPA configuration common to all profiles
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  # Graceful shutdown configuration for all profiles
  lifecycle:
    timeout-per-shutdown-phase: 30s

# Development profile (default)
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

server:
  port: 8080
  # Keep server alive - do not shut down on startup issues
  shutdown: graceful
  tomcat:
    # Ensure Tomcat thread pools stay alive
    threads:
      max: 200
      min-spare: 10

jwt:
  secret: mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes
  expirationMs: 3600000

logging:
  level:
    com.example.sms: DEBUG
    org.springframework.boot: INFO
    org.springframework.web: DEBUG

cors:
  allowed-origins: http://localhost:3000

# Production profile
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # CRITICAL: Use fallbacks so app doesn't fail if env vars missing
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    # Connection pool settings for production
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    show-sql: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # Keep server alive - graceful shutdown
  shutdown: graceful
  tomcat:
    # Ensure Tomcat thread pools stay alive
    threads:
      max: 200
      min-spare: 10

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes}
  expirationMs: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    com.example.sms: INFO
    org.springframework.boot: WARN
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

