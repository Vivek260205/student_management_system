# Spring Boot Application Configuration
# Defaults suitable for development. Override via environment variables for production.

# Server configuration - CRITICAL for keeping app alive
server.port=${PORT:8080}
server.address=0.0.0.0
server.shutdown=graceful
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Spring main configuration
spring.application.name=student-management-backend
spring.main.web-application-type=servlet
spring.main.lazy-initialization=false

# Database - use PostgreSQL via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# HikariCP connection pool configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# H2 Console (for development)
spring.h2.console.enabled=true

# Flyway configuration - CRITICAL: Disabled for all profiles
spring.flyway.enabled=false

# Lifecycle configuration - graceful shutdown
spring.lifecycle.timeout-per-shutdown-phase=30s

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.example.sms=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Management endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

