# Production grade environment configuration
# values are injected from cloud provider environment variables

# Active profile
spring.profiles.active=prod

# Server port
server.port=${PORT:8080}

# Database connection (Railway, etc.)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/student_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JPA options
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT secrets
jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

# CORS allow list (comma-separated)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
