# Spring Boot Application Configuration
# Defaults suitable for development. Override via environment variables for production.

# Server port - defaults to 8080, can be overridden by PORT env var
server.port=${PORT:8080}
server.address=0.0.0.0

# Database - uses sensible defaults that allow startup with in-memory DB
# Production should override via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate configuration
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 Console (for development)
spring.h2.console.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsAtLeast256BitsLongForJWTSigningAndVerificationPurposes}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Ensure this is a web application (not a CLI app)
spring.main.web-application-type=servlet

# Logging
logging.level.com.example.sms=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Management endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
